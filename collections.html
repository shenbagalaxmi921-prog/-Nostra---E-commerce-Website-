<!DOCTYPE html>
<html>

<head>
    <title>Collections</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>

        <h1>Nostra</h1>

        <div class="menu-icon" onclick="toggleMenu()">
            ☰
        </div>

        <ul id="nav-links">

            <li><a href="index.html">Home</a></li>
            <li><a href="collections.html">Collections</a></li>
            <li><a href="contact.html">Contact</a></li>

        </ul>

    </nav>

    <section class="collection-container">

        <h2>Collections</h2>

        <input type="text" id="search" placeholder="Search products...">

        <div class="filters">

            <button onclick="filterProducts('all')">All</button>
            <button onclick="filterProducts('shirt')">Shirts</button>
            <button onclick="filterProducts('hoodie')">Hoodies</button>
            <button onclick="filterProducts('tshirt')">T-Shirts</button>

        </div>

        <div class="products" id="product-list">

            <div class="product shirt">
                <img src="./image/Casual_Shirt.png">
                <h3>Casual Shirt</h3>
                <p>₹799</p>
            </div>

            <div class="product hoodie">
                <img src="./image/Winter_Hoodie.png">
                <h3>Winter Hoodie</h3>
                <p>₹1299</p>
            </div>

            <div class="product tshirt">
                <img src="./image/Printed_T-shirt.png">
                <h3>Printed T-shirt</h3>
                <p>₹499</p>
            </div>

            <div class="product shirt">
                <img src="./image/Formal_Shirt.png">
                <h3>Formal Shirt</h3>
                <p>₹999</p>
            </div>
            
        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
